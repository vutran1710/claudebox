name: Deploy to DigitalOcean

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Instance name"
        required: false
        default: "claudebox"
        type: string
      region:
        description: "DigitalOcean region"
        required: false
        default: "sgp1"
        type: choice
        options:
          - nyc1
          - nyc3
          - sfo3
          - ams3
          - sgp1
          - lon1
          - fra1
          - blr1
      size:
        description: "Droplet size"
        required: false
        default: "s-4vcpu-8gb"
        type: choice
        options:
          - s-2vcpu-4gb
          - s-4vcpu-8gb
          - s-8vcpu-16gb
          - c-4-8gib
          - c-8-16gib
          - c-16-32gib

env:
  DROPLET_NAME: ${{ inputs.name || 'claudebox' }}
  IMAGE: ubuntu-24-04-x64

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          if [ -z "$DIGITALOCEAN_ACCESS_TOKEN" ]; then
            echo "::error::DIGITALOCEAN_ACCESS_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$SSH_PUBLIC_KEY" ]; then
            echo "::error::SSH_PUBLIC_KEY secret is not set"
            exit 1
          fi

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Add SSH key to DigitalOcean
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          MD5_FP=$(ssh-keygen -lf /dev/stdin -E md5 <<< "$SSH_PUBLIC_KEY" | awk '{print $2}' | sed 's/^MD5://')
          KEY_ID=$(doctl compute ssh-key list --format ID,FingerPrint --no-header | grep "$MD5_FP" | awk '{print $1}' || true)
          if [ -z "$KEY_ID" ]; then
            KEY_ID=$(doctl compute ssh-key create claudebox-key --public-key "$SSH_PUBLIC_KEY" --format ID --no-header)
            echo "SSH key added to DigitalOcean (ID: $KEY_ID)."
          else
            echo "SSH key already exists (ID: $KEY_ID)."
          fi
          echo "SSH_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Destroy existing droplet if present
        run: |
          EXISTING_ID=$(doctl compute droplet list --format ID,Name --no-header | grep "$DROPLET_NAME" | awk '{print $1}' || true)
          if [ -n "$EXISTING_ID" ]; then
            echo "Destroying existing droplet $EXISTING_ID..."
            doctl compute droplet delete "$EXISTING_ID" --force
            sleep 10
          fi

      - name: Create cloud-init user data
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
        run: |
          B64_SSH_KEY=$(printf '%s' "$SSH_PUBLIC_KEY" | base64 -w0)
          B64_GH_TOKEN=$(printf '%s' "${GH_TOKEN:-}" | base64 -w0)

          cat > /tmp/cloud-init.yml <<'CLOUD_INIT_EOF'
          #cloud-config
          runcmd:
            - |
              mkdir -p /root/.ssh
              echo "$(echo '__B64_SSH_KEY__' | base64 -d)" >> /root/.ssh/authorized_keys
              chmod 700 /root/.ssh && chmod 600 /root/.ssh/authorized_keys
              curl -sL "https://github.com/__REPO__/releases/latest/download/cbx-linux-amd64" \
                -o /usr/local/bin/cbx
              chmod +x /usr/local/bin/cbx
              git clone --branch __REF__ "https://github.com/__REPO__.git" /opt/claudebox
              GH_TOKEN="$(echo '__B64_GH_TOKEN__' | base64 -d)"
              if [ -n "$GH_TOKEN" ]; then
                echo "$GH_TOKEN" | gh auth login --with-token 2>/dev/null || true
              fi
              touch /root/.cbx-ready
          CLOUD_INIT_EOF

          sed -i "s|__B64_SSH_KEY__|${B64_SSH_KEY}|" /tmp/cloud-init.yml
          sed -i "s|__B64_GH_TOKEN__|${B64_GH_TOKEN}|" /tmp/cloud-init.yml
          sed -i "s|__REPO__|${REPO}|" /tmp/cloud-init.yml
          sed -i "s|__REF__|${REF}|" /tmp/cloud-init.yml

      - name: Create Droplet
        run: |
          doctl compute droplet create "$DROPLET_NAME" \
            --image "$IMAGE" \
            --size "${{ inputs.size }}" \
            --region "${{ inputs.region }}" \
            --ssh-keys "$SSH_KEY_ID" \
            --user-data-file /tmp/cloud-init.yml \
            --tag-name "$DROPLET_NAME" \
            --wait

      - name: Ensure firewall exists
        run: |
          FW_ID=$(doctl compute firewall list --format ID,Name --no-header | grep "${DROPLET_NAME}-fw" | awk '{print $1}' || true)
          if [ -z "$FW_ID" ]; then
            doctl compute firewall create \
              --name "${DROPLET_NAME}-fw" \
              --tag-names "$DROPLET_NAME" \
              --inbound-rules "protocol:tcp,ports:22,address:0.0.0.0/0,address:::/0" \
              --outbound-rules "protocol:tcp,ports:all,address:0.0.0.0/0,address:::/0 protocol:udp,ports:all,address:0.0.0.0/0,address:::/0 protocol:icmp,address:0.0.0.0/0,address:::/0"
            echo "Firewall created (SSH-only inbound)."
          else
            echo "Firewall already exists (ID: $FW_ID)."
          fi

      - name: Get Droplet IP
        id: droplet-ip
        run: |
          IP=$(doctl compute droplet get "$DROPLET_NAME" --format PublicIPv4 --no-header)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Droplet IP: $IP"

      - name: Wait for droplet SSH to be ready
        env:
          IP: ${{ steps.droplet-ip.outputs.ip }}
        run: |
          echo "Waiting for SSH on $IP..."
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if nc -z -w5 "$IP" 22 2>/dev/null; then
              echo "SSH is responding!"
              break
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: port 22 not ready yet"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Timed out waiting for SSH"
              exit 1
            fi
            sleep $SLEEP_SECONDS
          done

      - name: Wait for cloud-init to finish
        run: |
          echo "Waiting 60s for cloud-init to download cbx and clone repo..."
          sleep 60

      - name: Print SSH access info
        env:
          IP: ${{ steps.droplet-ip.outputs.ip }}
        run: |
          echo "## ClaudeBox Ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run setup (one-time):" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "ssh -t root@${IP} 'cbx setup'" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Setup installs all tools, authenticates Claude, starts VNC + Chrome," >> "$GITHUB_STEP_SUMMARY"
          echo "and launches the **master Claude session** with a Remote Control URL." >> "$GITHUB_STEP_SUMMARY"
          echo "Open that URL on your phone to start." >> "$GITHUB_STEP_SUMMARY"
