name: Undeploy from Railway

on:
  workflow_dispatch:

env:
  SERVICE_NAME: claudebox

jobs:
  undeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Get service ID
        id: get-service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          PROJECT_ID=$(railway status --json 2>/dev/null | jq -r '.projectId // empty')
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Could not determine project ID. Is the token linked to a project?"
            exit 1
          fi
          # Use jq to safely build GraphQL payloads (prevents injection via variable values)
          QUERY_PAYLOAD=$(jq -n --arg pid "$PROJECT_ID" \
            '{ query: "query($id: String!) { project(id: $id) { services { edges { node { id name } } } } }", variables: { id: $pid } }')
          SERVICE_ID=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY_PAYLOAD" \
            | jq -r --arg name "$SERVICE_NAME" '.data.project.services.edges[] | select(.node.name == $name) | .node.id')
          if [ -z "$SERVICE_ID" ]; then
            echo "::error::Service '$SERVICE_NAME' not found in project"
            exit 1
          fi
          echo "Found service ID: $SERVICE_ID"
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Delete service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ steps.get-service.outputs.service_id }}
        run: |
          MUTATION_PAYLOAD=$(jq -n --arg sid "$SERVICE_ID" \
            '{ query: "mutation($id: String!) { serviceDelete(id: $id) }", variables: { id: $sid } }')
          RESULT=$(curl -sf "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$MUTATION_PAYLOAD")
          if echo "$RESULT" | jq -e '.errors' > /dev/null 2>&1; then
            echo "::error::Failed to delete service: $RESULT"
            exit 1
          fi
          echo "Service '$SERVICE_NAME' deleted successfully."
