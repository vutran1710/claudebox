name: Undeploy from Railway

on:
  workflow_dispatch:

env:
  SERVICE_NAME: claude-devbox

jobs:
  undeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Remove deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway down --service "$SERVICE_NAME" --yes && echo "Deployment removed for '$SERVICE_NAME'." || echo "::error::Failed to remove deployment"
